<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ADI — Tattoo Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#fff;font-family:monospace;font-size:12px;color:#000}

/* page system using :target - no JS needed */
.page{display:none;max-width:480px;margin:0 auto;border:1.5px solid #000;background:#fff}
.page:target{display:block}
body:not(:has(:target)) #page-home{display:block}

.header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1.5px solid #000;background:#fff;position:relative;z-index:10}
.rhino-icon{width:30px;height:30px;border:1.5px solid #000;display:flex;align-items:center;justify-content:center;font-size:9px;text-align:center;line-height:1.2;flex-shrink:0;text-decoration:none;color:#000}
.brand{font-size:15px;font-family:serif;letter-spacing:3px;font-weight:500;text-decoration:none;color:#000}
.ham-btn{width:32px;height:32px;border:1.5px solid #000;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;background:#fff;text-decoration:none;color:#000;user-select:none}

.placeholder-img{border:1.5px dashed #000;background:#f0f0f0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;cursor:pointer;width:100%;min-height:100px}
.placeholder-img span{font-size:10px;color:#555;text-align:center;padding:8px}
.placeholder-img small{font-size:9px;color:#aaa}
.placeholder-box{border:1.5px dashed #aaa;background:#f9f9f9;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:8px;font-size:10px;color:#555;text-align:center}
.section-title{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#888;margin-bottom:8px}
.page-head{padding:14px 12px 10px 12px;border-bottom:1.5px solid #000}
.page-head .label{font-size:9px;letter-spacing:2px;color:#888;text-transform:uppercase;margin-bottom:4px}
.page-head h1{font-size:20px;font-family:serif;letter-spacing:2px}
.page-head .sub{font-size:9px;color:#888;margin-top:4px;line-height:1.6}
.section{padding:12px;border-bottom:1px solid #ddd}
.section.bt{border-bottom:1.5px solid #000}
.tag{display:inline-block;border:1px solid #000;padding:3px 8px;font-size:9px;letter-spacing:1px;text-decoration:none;color:#000}
.tag-sm{display:inline-block;border:1px solid #aaa;padding:2px 6px;font-size:7px;letter-spacing:1px;text-transform:uppercase;color:#888}
.btn{border:2px solid #000;padding:12px;text-align:center;font-size:13px;font-family:serif;letter-spacing:2px;text-transform:uppercase;display:block;text-decoration:none;color:#000;cursor:pointer}
.btn-sm{display:inline-block;border:1px solid #000;padding:8px 16px;font-size:10px;letter-spacing:1px;text-transform:uppercase;text-decoration:none;color:#000;cursor:pointer}

/* dropdown menu - always in DOM, toggled by :target */
.menu-overlay{display:none;position:fixed;inset:0;z-index:20;background:rgba(0,0,0,0.55)}
#menu:target{display:block}
#menu:target ~ .page .header .ham-btn{background:#000;color:#fff}
.menu-panel{position:fixed;top:0;right:0;width:72%;height:100%;background:#fff;border-left:2px solid #000;z-index:21;overflow-y:auto}
.menu-panel .nav-label{padding:10px 16px 6px 16px;font-size:9px;letter-spacing:2px;color:#888;border-bottom:1px solid #ddd;text-transform:uppercase}
.menu-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;text-decoration:none;color:#000;border-bottom:1px solid #ddd}
.menu-item.bb{border-bottom:1.5px solid #000}
.menu-item .ml{font-size:13px;letter-spacing:1px}
.menu-item .ar{font-size:12px;color:#aaa}
.menu-social{display:flex;gap:16px;justify-content:center;padding:12px 16px;border-bottom:1px solid #eee}
.menu-social a{text-align:center;text-decoration:none;color:#000}
.menu-social span{font-size:8px;color:#555;margin-top:2px;display:block;text-transform:uppercase;letter-spacing:1px}
.menu-hint{padding:10px 16px;font-size:9px;color:#aaa;text-align:center}
.menu-close{position:fixed;inset:0;z-index:19;display:none}
#menu:target ~ .menu-close{display:block}

/* footer */
.footer{background:#000;padding:12px;display:flex;justify-content:space-around;align-items:center}
.footer a{text-align:center;text-decoration:none;color:#fff}
.footer .ficon{font-size:16px;display:block}
.footer .flabel{font-size:8px;color:#888;margin-top:2px;display:block;text-transform:uppercase;letter-spacing:1px}

/* book section */
.book-section{border-top:1.5px solid #000;padding:16px 12px;background:#f9f9f9}
.book-inner{display:flex;align-items:center;gap:12px}
.book-cover{width:60px;height:80px;border:1.5px dashed #000;background:#f0f0f0;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.book-cover span{font-size:7px;color:#555;text-align:center;text-transform:uppercase;letter-spacing:1px}
.book-info{flex:1}
.book-info h3{font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.book-info p{font-size:9px;color:#555;line-height:1.4}
.book-cta{display:inline-block;border:1.5px solid #000;padding:6px 12px;font-size:8px;letter-spacing:1px;text-transform:uppercase;text-decoration:none;color:#000;flex-shrink:0}

/* image overlay */
.img-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;justify-content:center;align-items:center}
.img-overlay:target{display:flex}
.img-overlay-inner{max-width:95vw;max-height:95vh;border:2px dashed #555;padding:20px;text-align:center}
.img-overlay-inner .box{width:200px;height:280px;border:1.5px dashed #888;background:#1a1a1a;display:flex;align-items:center;justify-content:center;margin:0 auto}
.img-overlay-inner .box span{color:#888;font-size:13px;text-align:center;padding:10px}
.img-overlay-inner .olabel{display:block;color:#888;font-size:10px;margin-top:12px;letter-spacing:1px}
.img-close{position:fixed;top:15px;right:20px;font-size:24px;color:#fff;text-decoration:none;z-index:10000}

/* gallery */
.gallery-wrap{border:1.5px dashed #000;margin:10px;position:relative}
.gallery-inner{background:#f0f0f0;height:220px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.gallery-arrow{position:absolute;top:50%;transform:translateY(-50%);font-size:18px;text-decoration:none;color:#000;z-index:2}
.gallery-arrow.l{left:6px}
.gallery-arrow.r{right:6px}
/* 2-col */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:8px}
/* timeline */
.tl{display:flex;align-items:stretch;overflow:hidden;border:1.5px solid #000}
.tl-i{flex:1;padding:8px 4px;border-right:1px solid #000;text-align:center}
.tl-i:last-child{border-right:none}
.tl-i .n{font-size:16px;font-family:serif}
.tl-i .u{font-size:7px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.tl-i .d{font-size:8px;color:#888;margin-top:4px;line-height:1.4}
/* step card */
.sc{border:1.5px solid #000;margin-bottom:10px;overflow:hidden}
.sc-h{background:#000;color:#fff;padding:7px 12px;display:flex;align-items:center;gap:8px}
.sc-h .sn{font-size:13px;font-family:serif}
.sc-h .sl{font-size:9px;letter-spacing:2px;text-transform:uppercase}
.sc-img{height:140px;margin:8px}
.sc-t{padding:8px 10px 10px 10px;font-size:9px;color:#555;line-height:1.8}
/* avoid grid */
.ag{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ag-i{border:1.5px solid #000;padding:10px 8px;text-align:center}
.ag-i .ai{font-size:18px;margin-bottom:4px}
.ag-i .al{font-size:8px;text-transform:uppercase;letter-spacing:1px}
.ag-i .ad{font-size:8px;color:#888;margin-top:3px;line-height:1.5}
/* long term */
.ltc{border-left:3px solid #000;padding:10px 12px;margin-bottom:8px;background:#f9f9f9}
.ltc .lt{font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
/* contact */
.cr{display:flex;align-items:center;gap:12px;border:1.5px solid #000;padding:12px;margin-bottom:8px;text-decoration:none;color:#000}
.cr .ci{width:36px;height:36px;border:1.5px solid #000;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cr .cl{font-size:9px;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.cr .cv{font-size:13px;font-family:serif;letter-spacing:1px}
.cr .ca{margin-left:auto;font-size:14px;color:#aaa}

.desktop-nav{display:none}

/* Tablet */
@media(min-width:768px){
  .page{max-width:90%}
  body{font-size:14px}
  .page-head h1{font-size:28px}
  .brand{font-size:20px;letter-spacing:4px}
  .section-title{font-size:11px;letter-spacing:3px}
  .gallery-inner{height:320px}
  .gallery-wrap{margin:16px}
  .tag{font-size:10px;padding:4px 10px}
  .btn{font-size:15px;padding:14px}
  .section{padding:16px 20px}
  .page-head{padding:18px 20px 14px}
  .header{padding:12px 20px}
  .book-section{padding:20px}
  .book-cover{width:80px;height:100px}
  .book-info h3{font-size:14px}
  .book-info p{font-size:11px}
  .book-cta{padding:8px 16px;font-size:10px}
  .placeholder-img{min-height:160px}
  .placeholder-img span{font-size:12px}
  .placeholder-img small{font-size:11px}
  .placeholder-box{font-size:12px;min-height:50px;padding:12px}
  .sc-img{height:180px}
  .tl-i{padding:10px 8px}
  .tl-i .n{font-size:20px}
  .tl-i .d{font-size:9px}
  .cr{padding:14px 16px}
  .cr .cv{font-size:15px}
  .cr .ci{width:42px;height:42px;font-size:18px}
  .footer{padding:16px 20px}
  .footer .ficon{font-size:18px}
  .footer .flabel{font-size:9px}
  .section .g2{gap:12px}
  .ag{gap:12px}
  .ag-i{padding:12px 10px}
  .ag-i .ai{font-size:22px}
  .ltc{padding:12px 16px}
}

/* Desktop */
@media(min-width:1024px){
  .page{max-width:1200px;border-width:2px;margin:24px auto}
  body{font-size:15px}
  .ham-btn{display:none}
  .menu-overlay,.menu-panel,.menu-close{display:none!important}
  .desktop-nav{display:flex;align-items:center;gap:24px;margin-left:24px}
  .rhino-icon{width:40px;height:40px;font-size:12px}
  .brand{font-size:24px;letter-spacing:5px}
  .header{padding:16px 24px}
  .d-nav-item{text-decoration:none;color:#000;font-size:11px;letter-spacing:2px;text-transform:uppercase;border-bottom:1.5px solid transparent;padding-bottom:3px}
  .d-nav-item:hover{border-bottom-color:#000}
  .d-nav-social{display:flex;gap:14px;margin-left:auto;font-size:15px}
  .d-nav-social a{text-decoration:none;color:#000}
  .page-head{padding:28px 24px 20px}
  .page-head h1{font-size:42px;letter-spacing:3px}
  .page-head .label{font-size:11px;letter-spacing:3px}
  .page-head .sub{font-size:11px}
  .section{padding:20px 24px}
  .section-title{font-size:12px;margin-bottom:14px}
  .gallery-inner{height:500px}
  .gallery-wrap{margin:20px}
  .placeholder-img{min-height:240px}
  .placeholder-img span{font-size:16px}
  .placeholder-box{font-size:13px;padding:16px}
  .btn{font-size:17px;padding:18px}
  .tag{font-size:11px;padding:5px 12px}
  .page-head+.section .placeholder-img{margin-bottom:0}
  .footer{padding:20px 24px}
  .footer .ficon{font-size:20px}
  .footer .flabel{font-size:10px}
  .book-section{padding:24px}
  .book-cover{width:100px;height:130px}
  .book-info h3{font-size:16px}
  .book-info p{font-size:12px}
  .book-cta{font-size:11px;padding:10px 20px}
  .sc-img{height:220px}
  .sc-h{padding:10px 16px}
  .sc-h .sn{font-size:16px}
  .sc-h .sl{font-size:11px}
  .sc-t{font-size:11px;padding:10px 14px}
  .ag-i{padding:16px 14px}
  .ag-i .ai{font-size:26px}
  .ag-i .al{font-size:10px}
  .cr{padding:16px 20px}
  .cr .ci{width:48px;height:48px;font-size:20px}
  .cr .cv{font-size:16px}
}
</head>
